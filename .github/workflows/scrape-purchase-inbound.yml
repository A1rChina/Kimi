name: Scrape and Clean CMMS Data

on:
  workflow_dispatch:
    inputs:
      date_range:
        description: "业务时间范围 YYYY-MM-DD/YYYY-MM-DD"
        required: false
        default: ""
      upload_to_d1:
        description: "是否将清洗后的数据写入 Cloudflare D1"
        required: false
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Run scraper
        env:
          CMMS_LOGIN_URL: ${{ secrets.CMMS_LOGIN_URL }}
          CMMS_PURCHASE_INBOUND_URL: ${{ secrets.CMMS_PURCHASE_INBOUND_URL }}
          CMMS_WAREHOUSE_DETAIL_URL: ${{ secrets.CMMS_WAREHOUSE_DETAIL_URL }}
          CMMS_WAREHOUSE_LEDGER_URL: ${{ secrets.CMMS_WAREHOUSE_LEDGER_URL }}
          CMMS_SALES_OUTBOUND_DETAIL_URL: ${{ secrets.CMMS_SALES_OUTBOUND_DETAIL_URL }}
          CMMS_DEFECTIVE_TRACKING_URL: ${{ secrets.CMMS_DEFECTIVE_TRACKING_URL }}
          CMMS_POST_PROCESS_REPORT_TRACKING_URL: ${{ secrets.CMMS_POST_PROCESS_REPORT_TRACKING_URL }}
          CMMS_PRODUCTION_TAKT_MAINTENANCE_URL: ${{ secrets.CMMS_PRODUCTION_TAKT_MAINTENANCE_URL }}
          CMMS_PRODUCTION_EQUIPMENT_MAINTENANCE_URL: ${{ secrets.CMMS_PRODUCTION_EQUIPMENT_MAINTENANCE_URL }}
          CMMS_EQUIPMENT_DOWNTIME_QUERY_URL: ${{ secrets.CMMS_EQUIPMENT_DOWNTIME_QUERY_URL }}
          CMMS_TOOLING_REPLACEMENT_QUERY_URL: ${{ secrets.CMMS_TOOLING_REPLACEMENT_QUERY_URL }}
          CMMS_MACHINING_TRANSFER_QUERY_URL: ${{ secrets.CMMS_MACHINING_TRANSFER_QUERY_URL }}
          CMMS_PROJECT_INFO_MAINTENANCE_URL: ${{ secrets.CMMS_PROJECT_INFO_MAINTENANCE_URL }}
          CMMS_PRODUCT_MATERIAL_MATCH_MAINTENANCE_URL: ${{ secrets.CMMS_PRODUCT_MATERIAL_MATCH_MAINTENANCE_URL }}
          CMMS_WEEKLY_PLAN_EXECUTION_TRACKING_URL: ${{ secrets.CMMS_WEEKLY_PLAN_EXECUTION_TRACKING_URL }}
          CMMS_USERNAME: ${{ secrets.CMMS_USERNAME }}
          CMMS_PASSWORD: ${{ secrets.CMMS_PASSWORD }}
          DATE_RANGE: ${{ github.event.inputs.date_range }}
        run: |
          python scripts/scrape_purchase_inbound.py

      - name: Clean database inputs
        run: |
          python scripts/clean_database_inputs.py

      - name: Validate normalized data can be inserted into SQLite
        run: |
          python - <<'PY'
          from pathlib import Path
          import csv
          import sqlite3

          root = Path("data/normalized")
          con = sqlite3.connect(":memory:")
          con.executescript((root / "schema.sql").read_text(encoding="utf-8"))

          for csv_path in sorted(root.glob("*.csv")):
              table = csv_path.stem
              with csv_path.open("r", encoding="utf-8", newline="") as f:
                  reader = csv.DictReader(f)
                  columns = reader.fieldnames or []
                  placeholders = ",".join(["?"] * len(columns))
                  sql = f"INSERT INTO {table} ({','.join(columns)}) VALUES ({placeholders})"
                  count = 0
                  for row in reader:
                      con.execute(sql, [None if row[column] == "" else row[column] for column in columns])
                      count += 1
              db_count = con.execute(f"SELECT COUNT(*) FROM {table}").fetchone()[0]
              if count != db_count:
                  raise SystemExit(f"{table}: CSV rows {count} != DB rows {db_count}")

          print("All normalized CSV files inserted successfully.")
          PY

      - name: Upload normalized data artifact
        uses: actions/upload-artifact@v4
        with:
          name: normalized-cmms-data
          path: |
            data/normalized/
            reports/08_database_readiness.md

      - name: Setup Node for Wrangler
        if: ${{ inputs.upload_to_d1 == 'true' || vars.UPLOAD_TO_D1 == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Upload cleaned data to Cloudflare D1
        if: ${{ inputs.upload_to_d1 == 'true' || vars.UPLOAD_TO_D1 == 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_NAME: ${{ vars.CLOUDFLARE_D1_DATABASE_NAME || secrets.CLOUDFLARE_D1_DATABASE_NAME }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN secret" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID secret" && exit 1)
          test -n "$D1_DATABASE_NAME" || (echo "Missing CLOUDFLARE_D1_DATABASE_NAME variable or secret" && exit 1)

          npx wrangler d1 execute "$D1_DATABASE_NAME" --remote --yes --file=data/normalized/schema.sql
          npx wrangler d1 execute "$D1_DATABASE_NAME" --remote --yes --file=data/normalized/upsert.sql

      - name: Commit scraped source exports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/excel_export/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update scraped CMMS exports"
            git push
          fi
