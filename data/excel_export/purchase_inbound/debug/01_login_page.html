<style type="text/css">
body {
    background-color:aliceblue;/*背景色，没有背景图片时显示背景色*/
}
.login {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
  background-image: url("images/login-background.jpg"); /*背景图片*/
  background-size: cover;
}
.login-form {
    width: 400px;
    height: 400px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff;
    border-radius: 15px;
    padding: 15px 15px 15px 15px;
    margin-top:100px; /*距离页面上边距离*/
    margin-left:0px;/*距离页面左边距离，默认是在中间*/
    opacity:0.9; /*登录框透明度*/
}

.box{
    overflow: hidden;
    display: flex;
    flex-direction: column;
}
.box h2{
    text-align: center;
    font-size: 22px;
    color: black;
    border-bottom: 1px solid rgb(105,105,105);
    height: 50px;
    margin-bottom: 40px;
}

.box input{
    width: 300px;
    height: 100%;
    margin-top: 10px;
    outline: none;
    border: 0;
    padding: 10px;
    background-color: transparent;
    border-bottom: 3px solid rgb(150,150,240);
    font: 900 14px '';
}

.go{
    text-align: center;
    display: block;
    height: 24px;
    padding: 12px;
    font: 900 16px '';
    border-radius: 10px;
    margin-top: 20px;
    color: #fff;
    letter-spacing: 3px;
    background-image: linear-gradient(to left,#fd79a8,#a29bf6);
}

</style>

 function GetFocus()
